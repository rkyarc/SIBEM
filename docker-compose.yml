version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sibem_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - sibem_network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: sibem_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sibem_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: sibem_postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432" 
    volumes:
      - sibem_db_data:/var/lib/postgresql/data
    networks:
      - sibem_network

  frontend:
    image: node:20-alpine
    container_name: sibem_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - sibem_network

networks:
  sibem_network:
    driver: bridge

volumes:
  sibem_db_data: